# ========================
# AIRFLOW 3 MIGRATION COMPOSE
# ========================
# This file is an Airflow 3.2.2 migration workspace for story #51.
# It intentionally does not provide backward compatibility with the previous
# Airflow 2.8 runtime or its Postgres volume contents.
#
# Suggested validation command:
# docker compose -f docker-compose.airflow3.yaml --profile airflow3 config

volumes:
  airflow-postgres-db:
    name: airflow-postgres-db

networks:
  airflow_net:
    name: airflow_net
    driver: bridge
  mlops_net:
    name: mlops_net
    driver: bridge

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.2-python3.12}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:?required}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SMTP__SMTP_HOST: "mailhog"
    AIRFLOW__SMTP__SMTP_PORT: 1025
    AIRFLOW__SMTP__SMTP_MAIL_FROM: "airflow@test.local"
    AIRFLOW__SMTP__SMTP_STARTTLS: "False"
    AIRFLOW__SMTP__SMTP_SSL: "False"
  volumes:
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./docker/dev/airflow/dags:/opt/airflow/dags
    - ./docker/dev/airflow/config/bike_dag_config.json:/opt/airflow/config/bike_dag_config.json:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-redis:
      condition: service_healthy
    airflow-postgres:
      condition: service_healthy
  networks:
    - airflow_net
    - mlops_net
  profiles: ["airflow3", "all", "ptf"]

services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - airflow_net
    profiles: ["airflow3", "all", "ptf"]

  airflow-redis:
    image: redis:latest
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50
    restart: unless-stopped
    networks:
      - airflow_net
    profiles: ["airflow3", "all", "ptf"]

  airflow-init:
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-airflow}
    command: >
      bash -c "
        set -euo pipefail &&
        airflow db migrate &&
        airflow users create
          --username $${_AIRFLOW_WWW_USER_USERNAME}
          --password $${_AIRFLOW_WWW_USER_PASSWORD}
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com &&
        airflow variables import /opt/airflow/config/variables.json &&
        (airflow connections delete api_dev || true) &&
        airflow connections import /opt/airflow/config/connections.json &&
        airflow pools set sequential_counters 2 'Orchestrator: trigger child DAGs sequentially'
      "
    restart: "no"
    volumes:
      - ./docker/dev/airflow/config/:/opt/airflow/config/
    profiles: ["airflow3", "all", "ptf"]

  airflow-api-server:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["api-server"]
    ports:
      - "${AIRFLOW_HOST_PORT:-12080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/api/v2/version || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles: ["airflow3", "all", "ptf"]

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["scheduler"]
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles: ["airflow3", "all", "ptf"]

  airflow-dag-processor:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["dag-processor"]
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles: ["airflow3", "all", "ptf"]

  airflow-worker:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
      DOCKER_HOST: unix:///var/run/docker.sock
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW_GID: ${AIRFLOW_GID:-0}
    user: "0:0"
    entrypoint: ["/opt/airflow/scripts/airflow-entrypoint.sh"]
    group_add:
      - ${AIRFLOW_GID:-0}
    command: ["celery", "worker"]
    restart: unless-stopped
    volumes:
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./docker/dev/airflow/dags:/opt/airflow/dags
      - ./docker/dev/airflow/config/bike_dag_config.json:/opt/airflow/config/bike_dag_config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/dev/airflow/scripts/airflow-entrypoint.sh:/opt/airflow/scripts/airflow-entrypoint.sh:ro
    networks:
      - airflow_net
      - mlops_net
    profiles: ["airflow3", "all", "ptf"]

  airflow-triggerer:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["triggerer"]
    healthcheck:
      test:
        - CMD-SHELL
        - airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles: ["airflow3", "all", "ptf"]

  airflow-flower:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: ["celery", "flower"]
    ports:
      - "${AIRFLOW_FLOWER_HOST_PORT:-12555}:5555"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - |
          celery --app airflow.providers.celery.executors.celery_executor.app status 2>&1 | grep -q "OK" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - airflow_net
    profiles: ["airflow3", "all", "ptf", "flower"]
