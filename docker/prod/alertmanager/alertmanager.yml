global:
  smtp_smarthost: "monitoring-mailhog:1025"
  smtp_from: "alerts@mlops.local"
  smtp_require_tls: false

route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 1m
  repeat_interval: 5m
  routes:
    - matchers:
        - severity="critical"
      receiver: critical-team
      group_wait: 5s
      group_interval: 15s
      repeat_interval: 15s

    - matchers:
        - severity="warning"
      receiver: warning-team
      repeat_interval: 1h

receivers:
  - name: default
    email_configs:
      - to: "default@mlops.local"

  - name: critical-team
    email_configs:
      - to: "critical@mlops.local"

  - name: warning-team
    email_configs:
      - to: "warning@mlops.local"
