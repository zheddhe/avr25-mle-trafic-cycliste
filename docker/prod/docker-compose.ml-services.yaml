# Production-like ML step service overlay.
#
# This overlay turns ML images into long-lived internal FastAPI services and
# keeps job-runner-api as the only Airflow-facing execution boundary.

services:
  ml-ingest-prod:
    command: null
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10081/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles: ["ml", "all", "ptf"]

  ml-features-prod:
    command: null
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10082/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles: ["ml", "all", "ptf"]

  ml-models-prod:
    command: null
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10083/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles: ["ml", "all", "ptf"]

  job-runner-api:
    depends_on:
      ml-ingest-prod:
        condition: service_healthy
      ml-features-prod:
        condition: service_healthy
      ml-models-prod:
        condition: service_healthy
    environment:
      JOB_RUNNER_EXECUTOR: service
      JOB_RUNNER_LOG_ROOT: /app/logs/job-runner
      JOB_RUNNER_SERVICE_TIMEOUT_SECONDS: "3600"
      ML_INGEST_SERVICE_URL: http://ml-ingest-prod:10081
      ML_FEATURES_SERVICE_URL: http://ml-features-prod:10082
      ML_MODELS_SERVICE_URL: http://ml-models-prod:10083
