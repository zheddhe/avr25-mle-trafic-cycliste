# ========================
# LOCAL PRODUCTION-LIKE RUNTIME
# ========================
# This runtime is intentionally separate from the root development runtime.
# It follows docs/local-prod-network-topology.md and keeps the runner execution
# boundary explicit in docs/local-prod-runtime.md.

volumes:
  prod-mlflow-postgres-db:
    name: prod-mlflow-postgres-db
  prod-mlflow-minio-data:
    name: prod-mlflow-minio-data
  prod-airflow-postgres-db:
    name: prod-airflow-postgres-db
  prod-airflow-redis-data:
    name: prod-airflow-redis-data
  prod-prometheus-data:
    name: prod-prometheus-data
  prod-grafana-data:
    name: prod-grafana-data
  prod-alertmanager-data:
    name: prod-alertmanager-data

networks:
  orchestration_net:
    name: orchestration_net
    driver: bridge
  pipeline_runtime_net:
    name: pipeline_runtime_net
    driver: bridge
  tracking_client_net:
    name: tracking_client_net
    driver: bridge
  tracking_backend_net:
    name: tracking_backend_net
    driver: bridge
  observability_net:
    name: observability_net
    driver: bridge
  dev_support_net:
    name: dev_support_net
    driver: bridge

x-prod-security: &prod-security
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:?required}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:?required}:${AIRFLOW_POSTGRES_PASSWORD:?required}@airflow-postgres/${AIRFLOW_POSTGRES_DB:?required}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_POSTGRES_USER:?required}:${AIRFLOW_POSTGRES_PASSWORD:?required}@airflow-postgres/${AIRFLOW_POSTGRES_DB:?required}
    AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:?required}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
    AIRFLOW__API__BASE_URL: http://airflow-api-server:8080
    AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_API_AUTH_JWT_SECRET:?required}"
    AIRFLOW__SIMPLE_AUTH_MANAGER__USERS: "admin:admin"
    AIRFLOW__SMTP__SMTP_HOST: "monitoring-mailhog"
    AIRFLOW__SMTP__SMTP_PORT: 1025
    AIRFLOW__SMTP__SMTP_MAIL_FROM: "airflow@test.local"
    AIRFLOW__SMTP__SMTP_STARTTLS: "False"
    AIRFLOW__SMTP__SMTP_SSL: "False"
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    airflow-redis:
      condition: service_healthy
    airflow-postgres:
      condition: service_healthy
  volumes:
    - ./runtime/logs/airflow:/opt/airflow/logs
    - ./runtime/data:/opt/airflow/data
    - ./runtime/artifacts:/app/artifacts:ro
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config/bike_dag_config.json:/opt/airflow/config/bike_dag_config.json:ro
  networks:
    - orchestration_net
    - dev_support_net
  profiles: ["all", "airflow", "ptf"]

services:
  # ========================
  # BUSINESS SERVICES
  # ========================
  ml-ingest-prod:
    <<: *prod-security
    image: ml-ingest:prod
    build:
      context: ../..
      dockerfile: ./docker/prod/ml/ingest/Dockerfile
    restart: unless-stopped
    environment:
      PUSHGATEWAY_ADDR: ${PUSHGATEWAY_ADDR}
      DISABLE_METRICS_PUSH: ${DISABLE_METRICS_PUSH}
      ARTIFACT_MANIFEST_ROOT: /app/artifacts/manifests
      ARTIFACT_REPOSITORY_ROOT: /app
      ARTIFACT_PRODUCER_SERVICE: ml-ingest-prod
      ARTIFACT_PRODUCER_IMAGE: ml-ingest:prod
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/logs:/app/logs
      - ./runtime/artifacts:/app/artifacts
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10081/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pipeline_runtime_net
    profiles: ["ml", "all", "ptf"]

  ml-features-prod:
    <<: *prod-security
    image: ml-features:prod
    build:
      context: ../..
      dockerfile: ./docker/prod/ml/features/Dockerfile
    restart: unless-stopped
    environment:
      PUSHGATEWAY_ADDR: ${PUSHGATEWAY_ADDR}
      DISABLE_METRICS_PUSH: ${DISABLE_METRICS_PUSH}
      ARTIFACT_MANIFEST_ROOT: /app/artifacts/manifests
      ARTIFACT_REPOSITORY_ROOT: /app
      ARTIFACT_PRODUCER_SERVICE: ml-features-prod
      ARTIFACT_PRODUCER_IMAGE: ml-features:prod
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/logs:/app/logs
      - ./runtime/artifacts:/app/artifacts
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10082/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pipeline_runtime_net
    profiles: ["ml", "all", "ptf"]

  ml-models-prod:
    <<: *prod-security
    image: ml-models:prod
    build:
      context: ../..
      dockerfile: ./docker/prod/ml/models/Dockerfile
    restart: unless-stopped
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      GIT_PYTHON_REFRESH: quiet
      PUSHGATEWAY_ADDR: ${PUSHGATEWAY_ADDR}
      DISABLE_METRICS_PUSH: ${DISABLE_METRICS_PUSH}
      ARTIFACT_MANIFEST_ROOT: /app/artifacts/manifests
      ARTIFACT_REPOSITORY_ROOT: /app
      ARTIFACT_PRODUCER_SERVICE: ml-models-prod
      ARTIFACT_PRODUCER_IMAGE: ml-models:prod
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/models:/app/models
      - ./runtime/logs:/app/logs
      - ./runtime/artifacts:/app/artifacts
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10083/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pipeline_runtime_net
      - tracking_client_net
      - tracking_backend_net
    profiles: ["ml", "all", "ptf"]

  api-prod:
    <<: *prod-security
    image: api:prod
    build:
      context: ../..
      dockerfile: ./docker/prod/api/Dockerfile
    ports:
      - "${API_HOST_PORT:-10000}:10000"
    restart: unless-stopped
    environment:
      DATA_FINAL_ROOT: /app/data/final
    volumes:
      - ./runtime/data/final:/app/data/final:ro
      - ./runtime/logs:/app/logs
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10000/docs', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pipeline_runtime_net
      - observability_net
    profiles: ["all", "api", "ptf"]

  job-runner-api:
    <<: *prod-security
    image: job-runner-api:prod
    build:
      context: ../..
      dockerfile: ./docker/prod/job-runner/Dockerfile
    restart: unless-stopped
    depends_on:
      ml-ingest-prod:
        condition: service_healthy
      ml-features-prod:
        condition: service_healthy
      ml-models-prod:
        condition: service_healthy
    environment:
      JOB_RUNNER_EXECUTOR: service
      JOB_RUNNER_LOG_ROOT: /app/logs/job-runner
      JOB_RUNNER_SERVICE_TIMEOUT_SECONDS: "3600"
      ML_INGEST_SERVICE_URL: http://ml-ingest-prod:10081
      ML_FEATURES_SERVICE_URL: http://ml-features-prod:10082
      ML_MODELS_SERVICE_URL: http://ml-models-prod:10083
    volumes:
      - ./runtime/logs/job-runner:/app/logs/job-runner
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:10080/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pipeline_runtime_net
    profiles: ["all", "runner", "ptf"]

  # ========================
  # MLFLOW SERVICES
  # ========================
  mlflow-postgres:
    image: ${MLFLOW_POSTGRES_IMAGE:?required}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB:?required}
    volumes:
      - prod-mlflow-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_POSTGRES_USER:?required}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracking_backend_net
    profiles: ["all", "mlflow", "ptf"]

  mlflow-minio:
    image: ${MLFLOW_MINIO_IMAGE:?required}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:?required}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:?required}
    volumes:
      - prod-mlflow-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tracking_backend_net
    profiles: ["all", "mlflow", "ptf"]

  mlflow-mc-init:
    image: ${MLFLOW_MINIO_MC_IMAGE:?required}
    depends_on:
      mlflow-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://mlflow-minio:9000 ${AWS_ACCESS_KEY_ID:?required} ${AWS_SECRET_ACCESS_KEY:?required} &&
      mc mb -p minio/mlflow || true &&
      mc anonymous set download minio/mlflow || true &&
      touch /tmp/ok && sleep 1
      "
    networks:
      - tracking_backend_net
    profiles: ["all", "mlflow", "ptf"]

  mlflow-server:
    image: ${MLFLOW_IMAGE:?required}
    restart: unless-stopped
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      mlflow-minio:
        condition: service_healthy
      mlflow-mc-init:
        condition: service_completed_successfully
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - ${MLFLOW_SERVER_ALLOWED_HOSTS:?required}
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${MLFLOW_POSTGRES_USER:?required}:${MLFLOW_POSTGRES_PASSWORD:?required}@mlflow-postgres:5432/${MLFLOW_POSTGRES_DB:?required}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow/
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?required}
      AWS_DEFAULT_REGION: us-east-1
      GIT_PYTHON_REFRESH: quiet
      MLFLOW_S3_ENDPOINT_URL: http://mlflow-minio:9000
    ports:
      - "${MLFLOW_HOST_PORT:-13001}:5000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tracking_client_net
      - tracking_backend_net
      - observability_net
    profiles: ["all", "mlflow", "ptf"]

  # ========================
  # AIRFLOW SERVICES
  # ========================
  airflow-postgres:
    image: ${AIRFLOW_POSTGRES_IMAGE:?required}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:?required}
    volumes:
      - prod-airflow-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_POSTGRES_USER:?required}"]
      interval: 10s
      retries: 5
      start_period: 15s
    networks:
      - orchestration_net
    profiles: ["all", "airflow", "ptf"]

  airflow-redis:
    image: ${AIRFLOW_REDIS_IMAGE:?required}
    restart: unless-stopped
    volumes:
      - prod-airflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - orchestration_net
    profiles: ["all", "airflow", "ptf"]

  airflow-init:
    <<: *airflow-common
    restart: "no"
    environment:
      <<: *airflow-common-env
    command: ["bash", "/opt/airflow/scripts/airflow-init.sh"]
    volumes:
      - ./airflow/config/:/opt/airflow/config/:ro
      - ./airflow/scripts/airflow-init.sh:/opt/airflow/scripts/airflow-init.sh:ro
    profiles: ["all", "airflow", "ptf"]

  airflow-api-server:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: ["api-server"]
    ports:
      - "${AIRFLOW_HOST_PORT:-12080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles: ["all", "airflow", "ptf"]

  airflow-scheduler:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: ["scheduler"]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $${HOSTNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles: ["all", "airflow", "ptf"]

  airflow-dag-processor:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: ["dag-processor"]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname $${HOSTNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles: ["all", "airflow", "ptf"]

  airflow-worker:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: ["celery", "worker"]
    environment:
      <<: *airflow-common-env
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d celery@$${HOSTNAME} || celery --app airflow.executors.celery_executor.app inspect ping -d celery@$${HOSTNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - orchestration_net
      - pipeline_runtime_net
      - dev_support_net
    profiles: ["all", "airflow", "ptf"]

  airflow-triggerer:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    command: ["triggerer"]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname $${HOSTNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles: ["all", "airflow", "ptf"]

  # ========================
  # MONITORING SERVICES
  # ========================
  monitoring-prometheus:
    image: ${PROMETHEUS_IMAGE:?required}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prod-prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - observability_net
    profiles: ["monitoring", "all", "ptf"]

  monitoring-grafana:
    image: ${GRAFANA_IMAGE:?required}
    restart: unless-stopped
    depends_on:
      - monitoring-prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "${GRAFANA_HOST_PORT:-14300}:3000"
    volumes:
      - prod-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../dev/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - observability_net
    profiles: ["monitoring", "all", "ptf"]

  monitoring-cadvisor:
    image: ${CADVISOR_IMAGE:?required}
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - observability_net
    profiles: ["monitoring", "all", "ptf"]

  monitoring-pushgateway:
    image: ${PUSHGATEWAY_IMAGE:?required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pipeline_runtime_net
      - observability_net
    profiles: ["monitoring", "all", "ptf"]

  monitoring-alertmanager:
    image: ${ALERTMANAGER_IMAGE:?required}
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - prod-alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - observability_net
      - dev_support_net
    profiles: ["all", "monitoring", "ptf"]

  monitoring-mailhog:
    image: ${MAILHOG_IMAGE:?required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dev_support_net
    profiles: ["all", "monitoring", "ptf"]
